<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Matching Reveal Game</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Sound Toggle Button -->
  <button class="sound-toggle" id="soundToggle" onclick="toggleSound()">
    <span id="soundIcon">🔊</span>
  </button>

  <!-- Game Header -->
  <div class="game-header">
    <h1 class="game-title">Memory Match</h1>
    <div class="progress-container" id="progressContainer">
      <span class="progress-text" id="progressText">0/12</span>
    </div>
  </div>

  <div class="instructions" id="instructionsBox">
    <div class="instruction-content">
      <h2>Welcome to Memory Match!</h2>
      <p>Match all the food tiles to reveal a special message.</p>
      <p class="time-info">You have 2 minutes to complete the challenge.</p>
      <button class="start-button" onclick="startGame()">
        <span class="button-icon">▶</span>
        Start Game
      </button>
    </div>
  </div>
  
  <div class="game-board" id="gameBoard"></div>
  
  <div class="timer-container" id="timerContainer">
    <div class="timer-circle">
      <div class="timer-text" id="timerText">120</div>
    </div>
  </div>
  
  <div class="envelope-container" id="envelopeContainer">
    <div class="confetti-wrapper" id="confettiWrapper"></div>
    
    <div class="envelope-wrapper">
      <div class="envelope">
        <div class="envelope-back"></div>
        <div class="envelope-flap" id="envelopeFlap"></div>
        <div class="envelope-letter" id="envelopeLetter">
          <div class="message-content" id="messageContent">
            <div class="congratulations">
              <span class="heart">♡</span>
              Congratulations!
              <span class="heart">♡</span>
            </div>
            <div class="main-message">
              Un abbraccio e un bacino<br>
              al piccolo Kamran<br>
              da Nik ♡
            </div>
          </div>
        </div>
      </div>
    </div>
    
    <div class="action-buttons" id="actionButtons">
      <button class="action-button primary" onclick="startGame()">
        <span class="button-icon">▶</span>
        Play Again
      </button>
      <button class="action-button secondary" onclick="resetToMenu()">
        Back to Menu
      </button>
    </div>
  </div>
  
  <div class="confetti" id="confetti"></div>
  
  <!-- Audio elements -->
  <audio id="clickSound" src="./mouse-click-sound-233951.mp3" preload="auto"></audio>
  <audio id="matchSound" src="./bubblepop-254773.mp3" preload="auto"></audio>
  <audio id="winSound" src="./success-fanfare-trumpets-6185.mp3" preload="auto"></audio>
  <audio id="envelopeSound" src="./envelope-open-sound.mp3" preload="auto"></audio>
  <audio id="tickSound" src="./clock-tick.mp3" preload="auto"></audio>
  <audio id="timeoutSound" src="./timeout-buzzer.mp3" preload="auto"></audio>
  <audio id="backgroundMusic" src="./backmusic.mp3" preload="auto"></audio>

  <script src="script.js"></script>
</body>
</html>
